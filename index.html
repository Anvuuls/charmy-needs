<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>CharmPass 1:1 Replica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        @font-face { font-family: 'MoovelAkkurat'; src: url('fonts/MoovelAkkurat-Bold.otf') format('opentype'); font-weight: 700; }
        @font-face { font-family: 'MoovelAkkurat'; src: url('fonts/MoovelAkkurat-Regular.otf') format('opentype'); font-weight: 400; }

        :root { --mta-red: #C8122C; --ticket-bg: #FFFFFF; --bg-dark: #000000; --divider-gray: #E0E0E0; --text-secondary: #757575; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; font-family: "MoovelAkkurat", "Helvetica Neue", Arial, sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; user-select: none; }

        #setup-screen { position: fixed; inset: 0; background: #ffffff; z-index: 1000; display: flex; flex-direction: column; padding: 24px; overflow-y: auto; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px; }
        .input-group input, .input-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
        #launch-btn { background: var(--mta-red); color: white; border: none; padding: 14px; border-radius: 4px; font-weight: 700; text-transform: uppercase; cursor: pointer; width: 100%; }

        #app-screen { display: none; position: relative; width: 100%; height: 100%; overflow: hidden; }
        
        /* White bars for top and bottom */
        .status-bar-bg { position: absolute; left: 0; width: 100%; background: #ffffff; z-index: 50; }
        .sb-top { top: 0; height: env(safe-area-inset-top, 44px); }
        .sb-bottom { bottom: 0; height: env(safe-area-inset-bottom, 34px); }

        #bg-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.02); z-index: 2; pointer-events: none; }

        #ticket-viewport { 
            position: absolute; inset: 0; 
            display: flex; 
            align-items: flex-start; 
            justify-content: flex-start; 
            z-index: 10; 
            pointer-events: auto;
            padding-top: 8vh;
            overflow-x: auto;
            overflow-y: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            touch-action: pan-x pan-y;
        }
        #ticket-viewport::-webkit-scrollbar { display: none; }

        .ticket-wrapper {
            width: 100vw;
            min-width: 100vw;
            display: flex;
            justify-content: center;
            scroll-snap-align: start;
            flex-shrink: 0;
            padding: 0 8.5vw;
            pointer-events: none;
        }

        .ticket {
            --base-width: 424;
            --base-height: 480;
            --scale: 1;
            width: calc(var(--base-width) * 1px);
            height: calc(var(--base-height) * 1px);
            background-color: var(--ticket-bg);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            position: relative;
            overflow: visible;
            transform: scale(var(--scale));
            transform-origin: top left;
            flex-shrink: 0;
            pointer-events: auto;
        }

        /* All ticket elements are absolute by default */
        .ticket div, .ticket span { position: absolute; }

        @keyframes datetime-pulse {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        .expire-time { left: 23px; top: 29px; font-size: 26px; letter-spacing: 0.6px; color: #000; animation: datetime-pulse 1s linear infinite alternate; }
        .expire-date { left: 281px; top: 30px; font-size: 26px; letter-spacing: 0px; color: #000; animation: datetime-pulse 1s linear infinite alternate; }

        .notches-unit { left: 0px; top: 72px; width: 382px; height: 34px; display: flex; align-items: center; cursor: ns-resize; z-index: 40; }
        .divider { height: 1px; background-color: var(--divider-gray); width: 100%; margin: 0 20px; position: static !important; flex-shrink: 0; pointer-events: none; }

        .product-name { left: 24px; top: 387px; font-size: 18px; font-weight: 700; color: #000; }
        .giant-letter { left: 22px; top: 142px; font-size: 125px; font-weight: 700; color: #000; line-height: 0.65; letter-spacing: -10px; }

        .route-origin { left: 24px; top: 335px; font-size: 35px; font-weight: 700; color: #000; letter-spacing: 0px; width: 63px; height: 42px; }
        .route-arrow { left: 102px; top: 330px; font-size: 37px; font-weight: 700; color: #000; }
        .route-dest { left: 142px; top: 335px; font-size: 35px; font-weight: 700; color: #000; opacity: 1; }
        .zones-text { left: 25px; top: 279px; font-size: 27px; font-weight: 700; color: #000; letter-spacing: 0px; }

        .red-box { left: 311px; top: 107px; width: 88px; height: 70px; background-color: var(--mta-red); border-radius: 10px; color: #fff; display: flex; justify-content: center; align-items: center; font-size: 44px; font-weight: 700; }
        .box-code { left: 327px; top: 118px; font-size: 44px; font-weight: 700; color: #fff; letter-spacing: 0px; z-index: 45; }
        .qr-container { left: 313px; top: 196px; width: 86px; height: 86px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .qr-container img { width: 100% !important; height: auto !important; position: static !important; }

        /* ── Customization Mode UI ── */
        .editable:not(.ticket):hover { outline: 1px dashed rgba(0,0,255,0.5); cursor: move; }
        .ticket.editable:hover { cursor: grab; box-shadow: 0 20px 50px rgba(0,0,255,0.25), 0 20px 50px rgba(0,0,0,0.7); }
        .selected { outline: 2px dashed #00f !important; z-index: 1000 !important; }

        .resize-handle { position: absolute !important; width: 12px; height: 12px; background: #00f; border: 2px solid white; z-index: 6000; touch-action: none; }
        .h-nw { top: -6px; left: -6px; cursor: nwse-resize; }
        .h-ne { top: -6px; right: -6px; cursor: nesw-resize; }
        .h-sw { bottom: -6px; left: -6px; cursor: nesw-resize; }
        .h-se { bottom: -6px; right: -6px; cursor: nwse-resize; }
        .h-n  { top: -6px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
        .h-s  { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
        .h-e  { right: -6px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }
        .h-w  { left: -6px; top: 50%; transform: translateY(-50%); cursor: ew-resize; }

        .ref-container { position: absolute; z-index: 100; pointer-events: auto; cursor: move; outline: 2px dashed #0f0; }
        .ref-container.locked { border: none; outline: none; pointer-events: none !important; }

        #grid-overlay { position: fixed; inset: 0; z-index: 5; pointer-events: none; display: none;
            background-image: linear-gradient(to right, rgba(255,255,255,0.1) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 20px 20px; }

        #edit-panel { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: white; color: black; z-index: 5000; padding: 10px 14px; border-top: 2px solid #C8122C; max-height: 45vh; overflow-y: auto; font-size: 12px; }
        #ep-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #ep-header button { padding: 4px 10px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; background: #f5f5f5; font-size: 12px; }
        #ep-header button:last-child { background: #C8122C; color: white; border-color: #C8122C; font-weight: bold; }
        #controls { display: flex; flex-wrap: wrap; gap: 6px 14px; }
        .ctrl-row { display: flex; align-items: center; gap: 5px; }
        .ctrl-row label { font-size: 11px; color: #666; min-width: 62px; }
        .ctrl-row input[type=number] { width: 58px; padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; }
        .ctrl-row input[type=text]   { width: 130px; padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; }
        .ctrl-row input[type=range]  { width: 90px; }
        .ctrl-row input[type=color]  { width: 36px; height: 24px; padding: 1px; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; }
        .ctrl-row button { padding: 3px 8px; cursor: pointer; border: 1px solid #ccc; border-radius: 3px; background: #f5f5f5; font-size: 11px; }

        #qr-overlay { display: none; position: fixed; inset: 0; background: white; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        #qr-full { width: 100%; max-width: 400px; aspect-ratio: 1; }
    
/* Scrolling animations */
      /************************/

      /* Bus */
      @keyframes busroll {
        from { transform: translateX(0%);    }
        to   { transform: translateX(-100%); }
      }

      #bus {
        animation: busroll 15s linear infinite;
      }


      /* Tram */
      @keyframes tramroll {
        from { transform: translateX(0%);   }
        to   { transform: translateX(100%); }
      }

      #tram {
        animation: tramroll 15s linear infinite;
      }


      /* Train */
      @keyframes trainroll {
        from { transform: translateX(0%);   }
        to   { transform: translateX(100%); }
      }

      #train {
        animation: trainroll 10s linear infinite;
      }


      /* Clouds */
      @keyframes cloudsfloat {
        from { transform: translateX(0%);   }
        to   { transform: translateX(-50%); }
      }

      #clouds {
        animation: cloudsfloat 25s linear infinite;
      }

      @keyframes cloudscopyfloat {
        from { transform: translateX(0%);   }
        to   { transform: translateX(-50%); }
      }

      #cloudscopy {
        animation: cloudscopyfloat 25s linear infinite;
      }


      /* Trees */
      @keyframes treespass {
        from { transform: translateX(0%);   }
        to   { transform: translateX(-50%); }
      }

      #trees {
        /* The trees move a little faster than the clouds */
        animation: treespass 16s linear infinite;
      }

      @keyframes treescopypass {
        from { transform: translateX(0%);   }
        to   { transform: translateX(-50%); }
      }

      #treescopy {
        /* The trees move a little faster than the clouds */
        animation: treescopypass 16s linear infinite;
      }


      /* City skyline */
      @keyframes cityscroll {
        from { transform: translateX(0%);   }
        to   { transform: translateX(-50%); }
      }

      #city {
        /* The city moves faster than the clouds but slower
         * than the trees */
        animation: cityscroll 20s linear infinite;
      }

      @keyframes citycopyscroll {
        from { transform: translateX(0%);   }
        to   { transform: translateX(-50%); }
      }

      #citycopy {
        /* The city moves faster than the clouds but slower
         * than the trees */
        animation: citycopyscroll 20s linear infinite;
      }
    
</style>
</head>

    <div id="grid-overlay"></div>

    <div id="setup-screen">
        <div class="input-group"><label>Service</label><select id="in-service" onchange="updateForm()"><option value="local">BaltimoreLink</option><option value="commuter">Commuter Bus</option><option value="marc">Marc Train</option></select></div>
        <div id="od-group" style="display:none">
            <div class="input-group"><label>Line</label><select id="in-line" onchange="updateMarcStations()"><option value="penn">Penn Line</option><option value="camden">Camden Line</option><option value="brunswick">Brunswick Line</option></select></div>
            <div class="input-group"><label>Origin</label><select id="in-origin"></select></div>
            <div class="input-group"><label>Destination</label><select id="in-dest"></select></div>
        </div>
        <div class="input-group">
            <label style="display:flex;justify-content:space-between;align-items:center;">
                <span>Daily Code</span>
                <span id="daily-code-status" style="font-size:10px;font-weight:400;text-transform:none;color:#888;"></span>
            </label>
            <input type="text" id="in-code" maxlength="2" placeholder="Enter today's code" autocomplete="off" autocorrect="off" spellcheck="false" style="text-transform:uppercase;letter-spacing:4px;font-weight:700;">
        </div>
        <div class="input-group"><label>Ticket Count</label><input type="number" id="in-count" value="1" min="1"></div>
        <div class="input-group" style="display:flex;align-items:center;gap:8px;">
            <input type="checkbox" id="in-edit-mode" style="width:auto;">
            <label for="in-edit-mode" style="text-transform:none;font-size:14px;color:#333;">Enable Customization Mode</label>
        </div>
        <button id="launch-btn">ACTIVATE TICKET</button>
    </div>

    <div id="edit-panel">
        <div id="ep-header">
            <strong id="edit-element-name">Editing: (None)</strong>
            <div style="display:flex;gap:6px;">
                <button onclick="unlockAllRefs()" style="background:#444;color:white;border-color:#444;">UNLOCK REFS</button>
                <button onclick="toggleGrid()">GRID</button>
                <button onclick="undoEdit()">UNDO</button>
                <button onclick="resetAllStyles()" style="background:#888;color:white;border-color:#888;">RESET</button>
                <button onclick="finalizeEdits()">FINALIZE</button>
            </div>
        </div>
        <div id="controls"></div>
    </div>

    <div id="app-screen">
        <div class="status-bar-bg sb-top"></div>
        <div class="status-bar-bg sb-bottom"></div>

    function loadDailyCodeEntry() {
        try {
            const s = JSON.parse(localStorage.getItem(DAILY_CODE_KEY) || 'null');
            if (s && s.code && s.expiresAt > Date.now()) return s;
        } catch (_) {}
        return null;
    }

    function saveDailyCode(code) {
        if (!code) return;
        localStorage.setItem(DAILY_CODE_KEY, JSON.stringify({
            code: code.toUpperCase().slice(0, 2),
            expiresAt: nextMidnightMs()
        }));
    }

    function applyCodeToLiveTickets(code) {
        document.querySelectorAll('.box-code').forEach(el => { el.textContent = code; });
    }

    function updateDailyCodeStatus() {
        const entry = loadDailyCodeEntry();
        const statusEl = document.getElementById('daily-code-status');
        const input    = document.getElementById('in-code');
        if (entry) {
            const exp = new Date(entry.expiresAt);
            const hh  = exp.getHours().toString().padStart(2,'0');
            const mm  = exp.getMinutes().toString().padStart(2,'0');
            if (statusEl) { statusEl.textContent = `expires ${exp.getMonth()+1}/${exp.getDate()} ${hh}:${mm}`; statusEl.style.color = '#4caf50'; }
            if (input && !input.value) input.value = entry.code;
        } else {
            if (statusEl) { statusEl.textContent = 'no code set for today'; statusEl.style.color = '#ff5722'; }
        }
    }

    function scheduleMidnightReset() {
        const msLeft = nextMidnightMs() - Date.now();
        setTimeout(() => {
            // Code expired — clear live tickets and update status
            applyCodeToLiveTickets('??');
            const input = document.getElementById('in-code');
            if (input) { input.value = ''; input.style.borderColor = '#ff5722'; }
            updateDailyCodeStatus();
            // Check every minute until a new code is entered
            const poller = setInterval(() => {
                if (loadDailyCodeEntry()) { clearInterval(poller); updateDailyCodeStatus(); }
            }, 60000);
        }, msLeft + 500);
    }

    // Wire up the code input: save on change, propagate to live tickets immediately
    document.getElementById('in-code').addEventListener('input', function() {
        const v = this.value.toUpperCase();
        this.value = v;
        this.style.borderColor = '';
        if (v.length === 2) {
            saveDailyCode(v);
            applyCodeToLiveTickets(v);
            updateDailyCodeStatus();
        }
    });

    async function fetchRealDailyCode() {
        try {
            const r = await fetch('/api/daily-code');
            if (!r.ok) throw new Error(r.status);
            const data = await r.json();
            if (data.code && data.code.length === 2) {
                localStorage.setItem(DAILY_CODE_KEY, JSON.stringify({
                    code: data.code.toUpperCase(),
                    expiresAt: data.expiresAt
                }));
                applyCodeToLiveTickets(data.code);
                document.getElementById('in-code').value = data.code.toUpperCase();
                updateDailyCodeStatus();
            }
        } catch (_) {
            // server unavailable — fall back to localStorage
        }
    }

    // Initialize on load
    updateDailyCodeStatus();
    scheduleMidnightReset();

    // Pre-fill input from stored code
    const _stored = loadDailyCodeEntry();
    if (_stored) document.getElementById('in-code').value = _stored.code;

    // Fetch real code from server, then refresh every 10 minutes
    fetchRealDailyCode();
    setInterval(fetchRealDailyCode, 10 * 60 * 1000);

        const typedCode = document.getElementById('in-code').value.toUpperCase();

        // Switch to this service's context

        for (const k in savedStyles) delete savedStyles[k];

        const stored = JSON.parse(localStorage.getItem('ticket_styles_' + service) || '{}');
        Object.assign(savedStyles, stored);
        const exp = new Date(now.getTime() + (service === 'commuter' ? 10 : 90) * 60000);
        const fmtT = d => `${d.getHours()%12||12}:${d.getMinutes().toString().padStart(2,'0')}:${d.getSeconds().toString().padStart(2,'0')} ${d.getHours()>=12?'PM':'AM'}`;
        const fmtD = d => `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}/${d.getFullYear().toString().slice(-2)}`;

        let marcHtml = '';
        if (service === 'marc') {
            const origin = document.getElementById('in-origin').value;
            const dest   = document.getElementById('in-dest').value;
            const z1 = stationZones[origin], z2 = stationZones[dest];
            const zones  = ["Zero Zone","One Zone","Two Zone","Three Zone","Four Zone","Five Zone"][Math.abs(z1-z2)+1] || "Four Zone";
            marcHtml = `
                <div class="route-origin editable">${origin}</div>

                <div class="ticket editable">

            const notches = wrap.querySelector('.notches-unit');
            if (notches) updateTicketMask(notches);

            document.getElementById(`qr-main-${i}`).onclick = (e) => {

        }

    function resizeTickets() {
        const tickets = document.querySelectorAll('.ticket');
        if (!tickets.length) return;

        // Exact 1:1 scaling based on 83vw
        const targetWidth = window.innerWidth * 0.83; 
        const baseW = 424;

        let scale = targetWidth / baseW;

        tickets.forEach(ticket => {
            ticket.style.setProperty('--scale', scale);
            // Compensate the layout box so flex centering uses the visual (scaled) width,
            // not the raw 424px base width. margin-right = (scale - 1) * baseW gives a
            // negative margin when scale < 1 (mobile) and positive when scale > 1 (desktop).
            ticket.style.marginRight = `${(scale - 1) * baseW}px`;
        });
    }

    function snapshotForUndo() {
        undoStack.push(JSON.stringify(savedStyles));
        if (undoStack.length > 50) undoStack.shift();
    }

    function applyStyleMap(map) {
        Object.keys(map).forEach(sel => {
            document.querySelectorAll(sel).forEach(el => {
                // Fixed: Allow height customization for the ticket
                if (sel === '.ticket' && ['width', 'top'].some(p => map[sel][p])) {
                   const {width, top, ...rest} = map[sel];
                   Object.assign(el.style, rest);
                } else if (map[sel]['data-radius'] !== undefined) {
                   el.setAttribute('data-radius', map[sel]['data-radius']);
                   const { 'data-radius': _, ...rest } = map[sel];
                   Object.assign(el.style, rest);
                } else {
                   Object.assign(el.style, map[sel]);
                }
                if (sel === '.notches-unit' || sel === '.ticket') {
                    const n = el.classList.contains('ticket') ? el.querySelector('.notches-unit') : el;
                    if (n) updateTicketMask(n);
                }
            });
        });
    }

    function undoEdit() {
        if (!undoStack.length) return;
        const prev = JSON.parse(undoStack.pop());
        Object.keys(savedStyles).forEach(sel => {
            document.querySelectorAll(sel).forEach(el => {
                Object.keys(savedStyles[sel]).forEach(p => { 
                    if (sel === '.ticket' && ['width', 'top'].includes(p)) return;
                    if (p === 'data-radius') { el.removeAttribute('data-radius'); return; }
                    el.style[p] = ''; 
                });
            });
        });
        for (const k in savedStyles) delete savedStyles[k];
        Object.assign(savedStyles, prev);
        applyStyleMap(savedStyles);
        localStorage.setItem('ticket_styles_' + currentService, JSON.stringify(savedStyles));
        if (selectedEl) updateControls(selectedEl);
    }

    function resetAllStyles() {
        if (!confirm('Clear ALL customizations and restore defaults?')) return;
        snapshotForUndo();
        Object.keys(savedStyles).forEach(sel => {
            document.querySelectorAll(sel).forEach(el => {
                Object.keys(savedStyles[sel]).forEach(p => { 
                    if (sel === '.ticket' && ['width', 'top'].includes(p)) return;
                    if (p === 'data-radius') { el.removeAttribute('data-radius'); return; }
                    el.style[p] = ''; 
                });
            });
        });
        for (const k in savedStyles) delete savedStyles[k];
        localStorage.removeItem('ticket_styles_' + currentService);
        // Re-apply baked defaults so the ticket returns to its baked baseline
        applyStyleMap(BAKED_DEFAULTS[currentService] || {});
        if (selectedEl) updateControls(selectedEl);
    }

    function getElSel(el) {
        if (el.id) return '#' + el.id;
        if (el.classList.contains('ticket')) return '.ticket';
        const cls = Array.from(el.classList).find(c => !['editable','selected','locked','ref-container'].includes(c));
        return cls ? '.' + cls : null;
    }

    function saveElStyle(el, prop, val) {
        const sel = getElSel(el);
        if (!sel) return;
        if (sel === '.ticket' && ['width', 'top'].includes(prop)) return;
        if (!savedStyles[sel]) savedStyles[sel] = {};
        savedStyles[sel][prop] = val;
        localStorage.setItem('ticket_styles_' + currentService, JSON.stringify(savedStyles));
    }

    function initCustomization() {
        document.getElementById('edit-panel').style.display = 'block';
        // Baked defaults already applied on launch — only re-apply in-progress edits on top
        applyStyleMap(savedStyles);
        document.querySelectorAll('.notches-unit').forEach(updateTicketMask);

        window.addEventListener('pointerdown', onPtrDown, true);
        window.addEventListener('pointermove', onPtrMove, true);
        window.addEventListener('pointerup',   onPtrUp,   true);

        const appScreen = document.getElementById('app-screen');
        appScreen.addEventListener('dragover', e => e.preventDefault());
        appScreen.addEventListener('drop', onImageDrop);
    }

    function onPtrDown(e) {
        if (e.target.closest('#edit-panel')) return;

        if (e.target.classList.contains('resize-handle')) {
            e.preventDefault(); e.stopPropagation();
            startResize(e); return;
        }

        const target = e.target.closest('.editable, .ref-container');
        if (!target) { deselectAll(); return; }
        if (target.classList.contains('locked')) return;

        e.preventDefault(); e.stopPropagation();
        selectElement(target);

        ptrStartX   = e.clientX;
        ptrStartY   = e.clientY;
        elStartLeft = target.classList.contains('ticket') ? 0 : target.offsetLeft;
        elStartTop  = target.classList.contains('ticket') ? 0 : target.offsetTop;
        ptrMoved    = false;
        dragging    = true;
    }

    function onPtrMove(e) {
        if (!dragging && !resizing) return;
        e.preventDefault();
        const dx = e.clientX - ptrStartX;
        const dy = e.clientY - ptrStartY;

        if (!ptrMoved) {
            if (Math.abs(dx) < 4 && Math.abs(dy) < 4) return;
            snapshotForUndo();
            ptrMoved = true;
        }

        const ticket = selectedEl.closest('.ticket');
        const scale  = ticket ? parseFloat(getComputedStyle(ticket).getPropertyValue('--scale')) || 1 : 1;      

        if (dragging && selectedEl) {
            if (selectedEl.classList.contains('ticket')) return; // Ticket position is fixed/responsive
            const nt = elStartTop + (dy / scale);
            let nl = elStartLeft + (dx / scale);
            if (selectedEl.classList.contains('notches-unit')) nl = 0; // Fix horizontally
            selectedEl.style.left = nl + 'px';
            selectedEl.style.top  = nt + 'px';
            saveElStyle(selectedEl, 'left', nl + 'px');
            saveElStyle(selectedEl, 'top',  nt + 'px');
            if (selectedEl.classList.contains('notches-unit')) updateTicketMask(selectedEl);
            if (controlInputs['left']) controlInputs['left'].value = Math.round(nl);
            if (controlInputs['top']) controlInputs['top'].value = Math.round(nt);
        }

        if (resizing && selectedEl) {
            // Fixed: Re-enable height resizing for the ticket, skip width/top
            if (selectedEl.classList.contains('ticket')) {
                const nh = Math.max(10, elStartH + (dy / scale));
                selectedEl.style.height = nh + 'px';
                saveElStyle(selectedEl, 'height', nh + 'px');
                if (controlInputs['height']) controlInputs['height'].value = Math.round(nh);
                const notches = selectedEl.querySelector('.notches-unit');
                if (notches) updateTicketMask(notches);
                return;
            }
            doResize(dx / scale, dy / scale);
        }
    }

    function onPtrUp() { dragging = resizing = false; activeHandle = null; ptrMoved = false; }

    function deselectAll() {
        if (!selectedEl) return;
        selectedEl.classList.remove('selected');
        selectedEl.querySelectorAll('.resize-handle').forEach(h => h.remove());
        selectedEl  = null;
        controlInputs = {};
        document.getElementById('edit-element-name').textContent = 'Editing: (None)';
        document.getElementById('controls').innerHTML = '';
    }

    function selectElement(el) {
        if (selectedEl === el) return;
        deselectAll();
        selectedEl = el;
        el.classList.add('selected');
        ['nw','ne','sw','se','n','s','e','w'].forEach(dir => {
            const h = document.createElement('div');
            h.className = 'resize-handle h-' + dir;
            el.appendChild(h);
        });
        document.getElementById('edit-element-name').textContent = 'Editing: ' + (getElSel(el) || 'element');
        updateControls(el);
    }

    function startResize(e) {
        resizing     = true;
        activeHandle = e.target;
        ptrStartX    = e.clientX;
        ptrStartY    = e.clientY;
        elStartW     = selectedEl.offsetWidth;
        elStartH     = selectedEl.offsetHeight;
        resizeRatio  = elStartW / (elStartH || 1);
        ptrMoved     = false;
        const isTicket = selectedEl.classList.contains('ticket');
        elStartLeft  = isTicket ? 0 : selectedEl.offsetLeft;
        elStartTop   = isTicket ? (parseFloat(selectedEl.style.top) || 0) : selectedEl.offsetTop;
    }

    function doResize(dx, dy) {
        const MIN      = 10;
        const isTicket = selectedEl.classList.contains('ticket');
        let nw = elStartW, nh = elStartH, nl = elStartLeft, nt = elStartTop;
        const hc = activeHandle.classList;

        if      (hc.contains('h-e'))  { nw = Math.max(MIN, elStartW + dx); }
        else if (hc.contains('h-w'))  { nw = Math.max(MIN, elStartW - dx); nl = elStartLeft + (elStartW - nw); }
        else if (hc.contains('h-s'))  { nh = Math.max(MIN, elStartH + dy); }
        else if (hc.contains('h-n'))  { nh = Math.max(MIN, elStartH - dy); nt = elStartTop  + (elStartH - nh); }
        else if (hc.contains('h-se')) { nw = Math.max(MIN, elStartW + dx); nh = nw / resizeRatio; }
        else if (hc.contains('h-sw')) { nw = Math.max(MIN, elStartW - dx); nh = nw / resizeRatio; nl = elStartLeft + (elStartW - nw); nt = elStartTop + (elStartH - nh); }
        else if (hc.contains('h-ne')) { nw = Math.max(MIN, elStartW + dx); nh = nw / resizeRatio; nt = elStartTop + (elStartH - nh); }
        else if (hc.contains('h-nw')) { nw = Math.max(MIN, elStartW - dx); nh = nw / resizeRatio; nl = elStartLeft + (elStartW - nw); nt = elStartTop + (elStartH - nh); }

        selectedEl.style.width  = nw + 'px';
        selectedEl.style.height = nh + 'px';
        saveElStyle(selectedEl, 'width',  nw + 'px');
        saveElStyle(selectedEl, 'height', nh + 'px');

        if (isTicket) {
            selectedEl.style.top = nt + 'px';
            saveElStyle(selectedEl, 'top', nt + 'px');
        } else {
            selectedEl.style.left = nl + 'px';
            selectedEl.style.top  = nt + 'px';
            saveElStyle(selectedEl, 'left', nl + 'px');
            saveElStyle(selectedEl, 'top',  nt + 'px');
            if (controlInputs['left']) controlInputs['left'].value = Math.round(nl);
        }
        if (controlInputs['width'])  controlInputs['width'].value  = Math.round(nw);
        if (controlInputs['height']) controlInputs['height'].value = Math.round(nh);
        if (controlInputs['top'])    controlInputs['top'].value    = Math.round(nt);
    }

    function updateTicketMask(unit) {
        const y    = unit.offsetTop + unit.offsetHeight / 2;
        const t    = unit.closest('.ticket');
        if (!t) return;
        const radius = parseFloat(unit.getAttribute('data-radius')) || 12;
        const mask = `radial-gradient(circle ${radius}px at 0px ${y}px, transparent ${radius}px, #000 ${radius+1}px), radial-gradient(circle ${radius}px at 100% ${y}px, transparent ${radius}px, #000 ${radius+1}px)`;
        t.style.webkitMaskImage = mask;
        t.style.maskImage       = mask;
        t.style.webkitMaskComposite = 'source-in';
        t.style.maskComposite = 'intersect';
    }

    function updateControls(el) {
        controlInputs = {};
        const panel = document.getElementById('controls');
        panel.innerHTML = '';
        const cs = window.getComputedStyle(el);

        const lockRow = makeRow();
        const lockBtn = document.createElement('button');
        lockBtn.textContent = el.classList.contains('locked') ? 'UNLOCK' : 'LOCK';
        lockBtn.onclick = () => {
            el.classList.toggle('locked');
            lockBtn.textContent = el.classList.contains('locked') ? 'UNLOCK' : 'LOCK';
            if (el.classList.contains('locked')) el.classList.remove('selected');
        };
        lockRow.appendChild(lockBtn);
        panel.appendChild(lockRow);

        const opRow = makeRow('Opacity');
        const opSlider = document.createElement('input');
        opSlider.type = 'range'; opSlider.min = '0'; opSlider.max = '1'; opSlider.step = '0.05';
        opSlider.value = parseFloat(cs.opacity) || 1;
        opSlider.oninput = () => { el.style.opacity = opSlider.value; saveElStyle(el, 'opacity', opSlider.value); };
        opRow.appendChild(opSlider);
        panel.appendChild(opRow);

        [['width','W (px)'],['height','H (px)'],['left','X (px)'],['top','Y (px)'],['font-size','Font sz'],['letter-spacing','Tracking'],['font-weight','Weight'],['border-top-left-radius','R-TL'],['border-top-right-radius','R-TR'],['border-bottom-left-radius','R-BL'],['border-bottom-right-radius','R-BR']].forEach(([prop, lbl]) => {
            const row = makeRow(lbl);
            const inp = document.createElement('input');
            inp.type  = 'number';
            if (prop === 'font-weight') {
                inp.step = '100'; inp.min = '100'; inp.max = '900';
            }
            inp.value = Math.round(parseFloat(cs[prop]) || 0);
            inp.oninput = () => {
                el.style[prop] = inp.value + (prop === 'font-weight' ? '' : 'px');
                saveElStyle(el, prop, el.style[prop]);
                if (el.classList.contains('notches-unit')) updateTicketMask(el);
            };
            controlInputs[prop] = inp;
            row.appendChild(inp); panel.appendChild(row);
        });

        if (el.classList.contains('notches-unit')) {
            const row = makeRow('Notch Size');
            const inp = document.createElement('input');
            inp.type = 'number';
            inp.value = parseFloat(el.getAttribute('data-radius')) || 12;
            inp.oninput = () => {
                el.setAttribute('data-radius', inp.value);
                saveElStyle(el, 'data-radius', inp.value);
                updateTicketMask(el);
            };
            row.appendChild(inp); panel.appendChild(row);
        }

        const firstChild = el.childNodes[0];
        if (firstChild && firstChild.nodeType === Node.TEXT_NODE && firstChild.textContent.trim()) {
            const row = makeRow('Text');
            const inp = document.createElement('input');
            inp.type  = 'text';
            inp.value = firstChild.textContent.trim();
            inp.oninput = () => { firstChild.textContent = inp.value; };
            row.appendChild(inp); panel.appendChild(row);
        }

        [['color','Text color'], ['background-color','BG color']].forEach(([prop, lbl]) => {
            const hex = rgbToHex(cs[prop]);
            if (!hex) return;
            const row = makeRow(lbl);
            const inp = document.createElement('input');
            inp.type  = 'color';
            inp.value = hex;
            inp.oninput = () => { el.style[prop] = inp.value; saveElStyle(el, prop, inp.value); };
            row.appendChild(inp); panel.appendChild(row);
        });
    }

    function makeRow(label) {
        const row = document.createElement('div'); row.className = 'ctrl-row';
        if (label) { const lbl = document.createElement('label'); lbl.textContent = label; row.appendChild(lbl); }
        return row;
    }

    function rgbToHex(rgb) {
        const m = rgb.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
        if (!m) return null;
        return '#' + [m[1], m[2], m[3]].map(n => parseInt(n).toString(16).padStart(2,'0')).join('');
    }

    function onImageDrop(e) {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = ev => {
            const div = document.createElement('div');
            div.className = 'ref-container';
            div.id = 'ref-' + Date.now();
            div.style.cssText = 'position:absolute; z-index:100; top:50px; left:50px; width:200px; height:auto;';
            const img = document.createElement('img');
            img.src = ev.target.result;
            img.style.cssText = 'width:100%; display:block; opacity:0.5; pointer-events:none;';
            div.appendChild(img);
            // Changed: Append to the scroll container so it moves with the tickets
            document.getElementById('ticket-viewport').appendChild(div);
            selectElement(div);
        };
        reader.readAsDataURL(file);
    }

    function toggleGrid() {
        const g = document.getElementById('grid-overlay');
        g.style.display = g.style.display === 'block' ? 'none' : 'block';
    }

    function unlockAllRefs() {
        document.querySelectorAll('.ref-container.locked').forEach(el => {
            el.classList.remove('locked');
        });
        alert("All reference images are now interactable again.");
    }

    async function finalizeEdits() {
        const svc = currentService;

        // 1. Merge in-progress edits into BAKED_DEFAULTS for this service
        if (!BAKED_DEFAULTS[svc]) BAKED_DEFAULTS[svc] = {};
        for (const sel in savedStyles) {
            if (!BAKED_DEFAULTS[svc][sel]) BAKED_DEFAULTS[svc][sel] = {};
            Object.assign(BAKED_DEFAULTS[svc][sel], savedStyles[sel]);
        }

        // 2. Clear in-progress localStorage — it's now baked
        localStorage.removeItem('ticket_styles_' + svc);
        for (const k in savedStyles) delete savedStyles[k];
        undoStack.length = 0;

        // 3. Build replacement text for the BAKED_DEFAULTS block
        const newBlock =
            '    // ==BAKED_DEFAULTS_START==\n' +
            '    const BAKED_DEFAULTS = ' + JSON.stringify(BAKED_DEFAULTS, null, 2).replace(/\n/g, '\n    ') + ';\n' +
            '    // ==BAKED_DEFAULTS_END==';

        // 4. Get the HTML source — try fetch first (works when served via HTTP/localhost)
        let html = null;
        try {
            const r = await fetch(location.href);
            if (r.ok) html = await r.text();
        } catch (_) {}

        // 5. If fetch blocked (file:// protocol), ask user to open the file
        if (!html && window.showOpenFilePicker) {
            try {
                const [fh] = await window.showOpenFilePicker({
                    types: [{ description: 'index.html', accept: { 'text/html': ['.html'] } }],
                    multiple: false
                });
                html = await (await fh.getFile()).text();
            } catch (_) {}
        }

        if (html) {
            // 6. Patch the BAKED_DEFAULTS block in the source
            const patched = html.replace(
                /[ \t]*\/\/ ==BAKED_DEFAULTS_START==[\s\S]*?\/\/ ==BAKED_DEFAULTS_END==/,
                newBlock
            );

            // 7. Save — try File System Access "Save As" first, then fall back to download
            let saved = false;
            if (window.showSaveFilePicker) {
                try {
                    const fh = await window.showSaveFilePicker({
                        suggestedName: 'index.html',
                        types: [{ description: 'HTML file', accept: { 'text/html': ['.html'] } }]
                    });
                    const w = await fh.createWritable();
                    await w.write(patched);
                    await w.close();
                    saved = true;
                    alert('✅ ' + svc.toUpperCase() + ' layout finalized and saved directly to your file!');
                } catch (_) {}
            }
            if (!saved) {
                // Fallback: trigger browser download
                const blob = new Blob([patched], { type: 'text/html' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'index.html';
                a.click();
                URL.revokeObjectURL(a.href);
                alert('✅ ' + svc.toUpperCase() + ' layout finalized! Replace your index.html with the downloaded file.');
            }
        } else {
            // Ultimate fallback: show the block to copy manually
            const ta = document.createElement('textarea');
            ta.value = newBlock;
            ta.style.cssText = 'position:fixed;top:10%;left:5%;width:90%;height:70%;z-index:99999;font-size:11px;font-family:monospace;padding:10px;';
            const close = document.createElement('button');
            close.textContent = '✕ Close';
            close.style.cssText = 'position:fixed;top:10%;right:5%;z-index:99999;padding:6px 12px;background:#C8122C;color:#fff;border:none;cursor:pointer;font-size:14px;border-radius:4px;';
            close.onclick = () => { ta.remove(); close.remove(); msg.remove(); };
            const msg = document.createElement('div');
            msg.style.cssText = 'position:fixed;top:calc(10% - 28px);left:5%;z-index:99999;color:#fff;font-weight:bold;font-size:13px;';
            msg.textContent = 'Copy all ↓ and replace the ==BAKED_DEFAULTS_START== block in your index.html:';
            document.body.append(ta, close, msg);
            ta.select();
        }
    }

    
function swap_day_night() {
        const sky = document.getElementById("sky");

        if (sky.getAttribute("class") === "night") {
          sky.setAttribute("fill", "#efb02f");
          sky.setAttribute("class", "day");
        }
        else {
          /* Put this case second so that the first time the
           * screen is tapped (when there are no classes on
           * the sky element) the color still changes. */
          sky.setAttribute("fill", "#143b66");
          sky.setAttribute("class", "night");
        }
      }

    document.body.addEventListener("click", swap_day_night);

</script>
