<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CharmPass 1:1</title>
    <style>
        @font-face {
            font-family: 'MoovelAkkurat';
            src: url('fonts/MoovelAkkurat-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'MoovelAkkurat';
            src: url('fonts/MoovelAkkurat-Bold.otf') format('opentype');
            font-weight: 700;
        }
        @font-face {
            font-family: 'MoovelAkkurat';
            src: url('fonts/MoovelAkkurat-Light.otf') format('opentype');
            font-weight: 300;
        }

        :root {
            --mta-red: #9d2236; /* Exact colorPrimary from JADX */
            --ticket-bg: #fcfcfc; /* Exact ticket_stack_background_color */
            --text-dark: #212121;
            --text-grey: #757575;
            --bg-dark: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            font-family: "MoovelAkkurat", "Roboto", sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        /* --- Setup Screen --- */
        #setup-screen {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }
        .setup-header {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 24px;
            border-bottom: 2px solid var(--mta-red);
            padding-bottom: 12px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-grey);
            margin-bottom: 6px;
            text-transform: uppercase;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d0d0d0;
            border-radius: 4px;
            font-size: 16px;
            font-family: "MoovelAkkurat", sans-serif;
            background: #f9f9f9;
        }
        #launch-btn {
            background: var(--mta-red);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* --- App Screen --- */
        #app-screen {
            display: none;
            position: relative;
            width: 100%;
            height: 100%;
        }

        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.1);
            z-index: 2;
        }

        #ticket-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            z-index: 10;
            padding: 0 calc(50vw - 144px);
        }
        #ticket-viewport::-webkit-scrollbar { display: none; }

        .ticket-wrapper {
            scroll-snap-align: center;
            flex-shrink: 0;
            width: 288px; /* flash_pass_ticket_cell_width */
            margin: 0 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .ticket {
            width: 100%;
            background-color: var(--ticket-bg);
            border-radius: 4px; /* ticket_stack_corner_radius */
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Expiration Header */
        .ticket-header {
            height: 60px; /* flash_pass_ticket_expiration_section_height */
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
        }
        .exp-time, .exp-date {
            font-size: 20px; /* Title style */
            font-weight: 700;
            color: #000;
        }

        .divider {
            height: 1px;
            background-color: #e0e0e0;
            margin: 0 16px;
        }

        /* Body Section */
        .ticket-body {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            min-height: 220px;
        }

        .left-section {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .agency-logo {
            height: 24px;
            width: auto;
            margin-bottom: 12px;
            align-self: flex-start;
        }
        .giant-letter {
            font-size: 120px; /* flash_pass_ticket_start_header_max_text_size approx */
            font-weight: 700;
            color: #000;
            line-height: 0.8;
            margin-left: -4px;
        }
        .loc-container {
            margin-top: 8px;
        }
        .location {
            font-size: 15px;
            font-weight: 700;
            color: #000;
            text-transform: uppercase;
        }
        .to-text {
            font-size: 12px;
            color: #666;
            margin: 2px 0;
        }
        .product-name {
            font-size: 14px;
            font-weight: 700;
            color: #444;
            margin-top: auto;
            text-transform: uppercase;
        }

        .right-section {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            width: 60px;
            flex-shrink: 0;
        }
        .red-box {
            width: 60px; /* flash_pass_ticket_day_use_code_width */
            height: 45px; /* flash_pass_ticket_day_use_code_height */
            background-color: var(--mta-red);
            border-radius: 22.5px; /* Fully rounded ends */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: 700;
        }
        .qr-code {
            width: 60px;
            height: 72px; /* flash_pass_ticket_scan_code_height */
            margin-top: 12px;
            background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJAAAACQCAMAAADf80W2AAAALVBMVEUAAAD///8AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAsM6m2AAAADnRSTlMAAQIDBAUGBwgJCgsMDVv8pToAAAFcSURBVHgB7dHNSsNAFIVhzX13+uI0+M0I4v6vYvA5fA0E0zPzNlVwO2yX+xI4v5zJ5/NZ7MtnfDyeD8fz4XjcH46743533L4H3LwGvF8e4/b4YfVxbGvD55j3x5eF5fFyPD4P/XN4C+/v53gNfF583f7B49fF1+0ffH1dfN3+wd7H4Pfr4/b4YfXh7bZfHtfWxmW/PDrDff+M6+Xp2XF/P74GvF+eRse/4XvF0+Po+Hd6vD047h+fHvePv5NfA94vP96fv4NfH7fHD6sPr6/p0W0PDr8GvF9+vOf+D694exwtLp+Lz+bH09/pX49vH0+/fH5dfP6zXwN+f6yOf8P3H16v6eU/u+3B4deAd/B5O88+w8Pr+ff8fH5dfL5dfP6zXwPe58H8H49fF1+3ffB1+wd7H4N38P7A5/j98Rjff5w8vg/f56+v/wBq20vIu9u6rAAAAABJRU5ErkJggg==');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* Perforation Notches */
        .ticket::before, .ticket::after {
            content: "";
            position: absolute;
            top: 60px;
            width: 14px;
            height: 14px;
            background-color: rgba(0,0,0,0.2); /* Blend with video */
            border-radius: 50%;
            z-index: 5;
            transform: translateY(-50%);
        }
        .ticket::before { left: -7px; }
        .ticket::after { right: -7px; }

        .indicator {
            margin-top: 16px;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-header">CharmPass Setup</div>
        <div class="input-group">
            <label>Service</label>
            <select id="in-service" onchange="updateForm()">
                <option value="local">Local Bus / BaltimoreLink</option>
                <option value="marc">MARC Train</option>
            </select>
        </div>
        <div id="od-group" style="display:none">
            <div class="input-group"><label>Origin</label><select id="in-origin"></select></div>
            <div class="input-group"><label>Destination</label><select id="in-dest"></select></div>
        </div>
        <div class="input-group"><label>Giant Letter</label><input type="text" id="in-letter" value="F" maxlength="1"></div>
        <div class="input-group"><label>Red Box Code</label><input type="text" id="in-code" value="G7" maxlength="3"></div>
        <div class="input-group"><label>Product</label><input type="text" id="in-product" value="BaltimoreLink"></div>
        <div class="input-group"><label>Tickets</label><input type="number" id="in-count" value="1"></div>
        <div class="input-group"><label>Exp Minutes</label><input type="number" id="in-minutes" value="90"></div>
        <button id="launch-btn">ACTIVATE</button>
    </div>

    <div id="app-screen">
        <video id="bg-video" autoplay loop muted playsinline><source src="scrolling_background.mp4" type="video/mp4"></video>
        <div class="overlay"></div>
        <div id="ticket-viewport"></div>
    </div>

    <script>
        const marcStations = ["Aberdeen", "Baltimore Penn Station", "BWI Airport", "Bowie State", "Camden Station", "Frederick", "Halethorpe", "Odenton", "Rockville", "Silver Spring", "Washington Union Station", "West Baltimore"];
        
        function populate(el, opts) {
            el.innerHTML = '';
            opts.forEach(o => { const opt = document.createElement('option'); opt.value = opt.text = o; el.appendChild(opt); });
        }

        function updateForm() {
            const isMarc = document.getElementById('in-service').value === 'marc';
            document.getElementById('od-group').style.display = isMarc ? 'block' : 'none';
            if (isMarc) {
                populate(document.getElementById('in-origin'), marcStations);
                populate(document.getElementById('in-dest'), [...marcStations].reverse());
                document.getElementById('in-product').value = "MARC Train";
            } else {
                document.getElementById('in-product').value = "BaltimoreLink";
            }
        }
        updateForm();

        document.getElementById('launch-btn').onclick = () => {
            const count = parseInt(document.getElementById('in-count').value);
            const minutes = parseInt(document.getElementById('in-minutes').value);
            const service = document.getElementById('in-service').value;
            const letter = document.getElementById('in-letter').value.toUpperCase();
            const code = document.getElementById('in-code').value.toUpperCase();
            const product = document.getElementById('in-product').value;
            const origin = document.getElementById('in-origin').value;
            const dest = document.getElementById('in-dest').value;

            const exp = new Date(Date.now() + minutes * 60000);
            const timeStr = exp.toLocaleTimeString([], {hour: 'numeric', minute:'2-digit', second:'2-digit', hour12: true});
            const dateStr = exp.toLocaleDateString([], {month:'2-digit', day:'2-digit', year:'2-digit'});

            const viewport = document.getElementById('ticket-viewport');
            viewport.innerHTML = '';

            for(let i=1; i<=count; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'ticket-wrapper';
                wrap.innerHTML = `
                    <div class="ticket">
                        <div class="ticket-header">
                            <div class="exp-time">${timeStr}</div>
                            <div class="exp-date">${dateStr}</div>
                        </div>
                        <div class="divider"></div>
                        <div class="ticket-body">
                            <div class="left-section">
                                <img src="ticket_icon.png" class="agency-logo">
                                ${service === 'local' ? `<div class="giant-letter">${letter}</div>` : `
                                    <div class="loc-container">
                                        <div class="location">${origin}</div>
                                        <div class="to-text">to</div>
                                        <div class="location">${dest}</div>
                                    </div>
                                `}
                                <div class="product-name">${product}</div>
                            </div>
                            <div class="right-section">
                                <div class="red-box">${code}</div>
                                <div class="qr-code"></div>
                            </div>
                        </div>
                    </div>
                    ${count > 1 ? `<div class="indicator">Ticket ${i} of ${count}</div>` : ''}
                `;
                viewport.appendChild(wrap);
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('bg-video').play();
        };
    </script>
</body>
</html>
